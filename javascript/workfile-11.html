<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <script defer src="script-11.js"></script>
    <style>
        .btn {
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            color: white
        }

        .btn-blue {
            background-color: #007BFF;
        }


        .btn-green {
            background-color: #007BFF;
        }

        .btn-red {
            background-color: #dcc035;
        }

        .btn-purple {
            background-color: #6f42c1;
        }

        .btn-yellow {
            background-color: #d6d61f;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            /* Hace que se apilen verticalmente */
            gap: 10px;
            /* Este es el espacio entre botones */
        }
    </style>
</head>

<body>
    <h1>Events</h1>


    <button id="myButton" class="btn-blue">Click me</button>

    <div id="outer">
        <div id="inner">
            <button id="myNewButton" class="btn-yellow">Click me</button>
        </div>
    </div>

    <button id="myButton1" class="btn-blue">Click me</button>

    <div id="buttonContainer" class="button-container">
        <h2>Button container</h2>
        <button id="btn-1" class="btn btn-green">Button 1</button>
        <button id="btn-2" class="btn btn-red">Button 2</button>
        <button id="btn-3" class="btn btn-blue">Button 3</button>
    </div>


</body>

</html>
