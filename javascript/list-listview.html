 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-4xl bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700">
        
        <div class="p-6 border-b border-gray-700 bg-gray-800">
            <h1 class="text-2xl font-bold text-white tracking-tight">Product Inventory</h1>
        </div>

        <div class="hidden md:grid grid-cols-12 gap-4 px-6 py-3 bg-gray-900/50 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-700">
            <div class="col-span-6">Product Name</div>
            <div class="col-span-3">Price</div>
            <div class="col-span-3 text-right">Availability</div>
        </div>

        <div id="product-list-container" class="divide-y divide-gray-700">
            </div>

    </div>

    <script src="list-listview.js"></script>
</body>
</html>
